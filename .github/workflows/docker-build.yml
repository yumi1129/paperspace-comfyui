name: Build and Push ComfyUI Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 読者に配布するイメージ名になります（例: shibashiba2/paperspace-comfyui:latest）
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/paperspace-comfyui:latest
          # ビルドを爆速にするキャッシュ設定
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/paperspace-comfyui:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/paperspace-comfyui:buildcache,mode=max
