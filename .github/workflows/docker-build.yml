name: Build and Push ComfyUI Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.yumi1129 }}
          password: ${{ secrets.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 }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 読者に配布するイメージ名になります（例: shibashiba2/paperspace-comfyui:latest）
          tags: ${{ secrets.yumi1129 }}/paperspace-comfyui:latest
          # ビルドを爆速にするキャッシュ設定
          cache-from: type=registry,ref=${{ secrets.yumi1129 }}/paperspace-comfyui:buildcache
          cache-to: type=registry,ref=${{ secrets.yumi1129 }}/paperspace-comfyui:buildcache,mode=max
